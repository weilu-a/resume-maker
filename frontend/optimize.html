<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>简历工坊 - 简历优化</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="css/app.css"/>
<style>
  .pdf-sheet {
    background: #fff;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    border-radius: 2px;
    overflow: hidden;
    width: min(100%, 520px);
    aspect-ratio: 210 / 297;
    margin: 0 auto;
  }
  .pdf-sheet img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #fff;
  }
  .tpl-chip {
    border: 1px solid #3A3A3A;
    background: #2D2D2D;
    color: #AAAAAA;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
  }
  .tpl-chip.active {
    border-color: #4F8CFF;
    color: #fff;
    background: #4F8CFF33;
  }
</style>
</head>
<body class="h-screen flex overflow-hidden">
<aside class="w-[220px] bg-[#1E1E1E] flex flex-col border-r border-[#3A3A3A] flex-none">
<div class="p-6">
<div class="flex items-center space-x-3 mb-6">
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center border-2 border-[#3A3A3A]">
<iconify-icon class="text-xl" icon="ph:user-bold"></iconify-icon>
</div>
<div><div class="text-sm font-medium">简历探险者</div></div>
</div>
<nav class="space-y-1">
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-[#AAAAAA] hover:bg-[#2D2D2D] transition-colors" href="index.html">
<iconify-icon class="text-xl" icon="heroicons:home-solid"></iconify-icon><span>首页</span>
</a>
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-[#AAAAAA] hover:bg-[#2D2D2D] transition-colors" href="generate.html">
<iconify-icon class="text-xl" icon="heroicons:document-plus-solid"></iconify-icon><span>生成简历</span>
</a>
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg sidebar-item-active" href="optimize.html">
<iconify-icon class="text-xl" icon="heroicons:sparkles-solid"></iconify-icon><span>简历优化</span>
</a>
<a class="flex items-center space-x-3 px-4 py-3 rounded-lg text-[#AAAAAA] hover:bg-[#2D2D2D] transition-colors" href="interview.html">
<iconify-icon class="text-xl" icon="heroicons:chat-bubble-left-right-solid"></iconify-icon><span>模拟面试</span>
</a>
</nav>
</div>
</aside>

<main class="flex-1 flex flex-col min-w-0">
<header class="h-16 border-b border-[#3A3A3A] flex items-center justify-between px-8 bg-[#1A1A1A] z-10">
<h1 class="text-lg font-bold">简历智能优化 <span class="text-sm font-normal text-[#666666] ml-2">提升求职竞争力的 AI 引擎</span></h1>
<div class="hidden items-center space-x-4" id="action-btns">
<span id="ai-source-opt" class="text-[11px] text-[#AAAAAA]"></span>
<button id="btn-reupload" class="px-4 py-1.5 rounded-lg bg-[#2D2D2D] text-sm text-[#AAAAAA] hover:text-white transition-colors border border-[#3A3A3A]">重新上传</button>
<button id="btn-export-opt" class="px-6 py-1.5 rounded-lg bg-[#4F8CFF] hover:bg-[#4070FF] transition-colors text-sm font-medium">导出优化版 PDF</button>
</div>
</header>

<div class="flex-1 relative overflow-hidden">
<div class="h-full flex flex-col items-center justify-center p-8" id="upload-view">
<div id="drop-zone" class="w-full max-w-2xl border-2 border-dashed border-[#3A3A3A] rounded-3xl p-16 flex flex-col items-center justify-center hover:border-[#4F8CFF] hover:bg-[#252525] transition-all cursor-pointer group">
<div class="w-20 h-20 bg-[#4F8CFF]/10 rounded-full flex items-center justify-center text-[#4F8CFF] mb-6 group-hover:scale-110 transition-transform">
<iconify-icon class="text-5xl" icon="ph:file-arrow-up-duotone"></iconify-icon>
</div>
<h3 class="text-xl font-bold mb-2">点击选择 PDF 简历</h3>
<p class="text-[#666666] mb-2">支持 PDF 格式（桌面文件对话框选择）</p>
<p id="upload-filename" class="text-sm text-[#4F8CFF]"></p>
<div class="flex items-center space-x-6 text-[#AAAAAA] mt-8">
<div class="flex items-center space-x-2"><iconify-icon icon="ph:text-aa-bold"></iconify-icon><span class="text-sm">内容矫正</span></div>
<div class="flex items-center space-x-2"><iconify-icon icon="ph:layout-bold"></iconify-icon><span class="text-sm">排版美化</span></div>
<div class="flex items-center space-x-2"><iconify-icon icon="ph:chart-line-up-bold"></iconify-icon><span class="text-sm">能力提炼</span></div>
</div>
</div>
</div>

<div class="hidden h-full flex flex-col items-center justify-center" id="optimizing-view">
<div class="relative w-32 h-32 mb-8">
<div class="absolute inset-0 rounded-full border-4 border-t-[#4F8CFF] animate-spin"></div>
<div class="absolute inset-4 rounded-full border-4 border-b-[#10B981] animate-reverse-spin"></div>
<div class="absolute inset-0 flex items-center justify-center text-3xl text-[#4F8CFF]">
<iconify-icon icon="ph:sparkles-fill"></iconify-icon>
</div>
</div>
<h3 class="text-2xl font-bold mb-3">AI 深度优化中</h3>
<div class="flex space-x-2 text-[#AAAAAA]"><span id="loading-text">正在分析原始文案...</span></div>
</div>

<div class="hidden h-full flex flex-col overflow-hidden" id="result-view">
<div class="bg-[#252525] px-8 py-4 border-b border-[#3A3A3A] flex items-center justify-between gap-4 flex-wrap">
<div class="flex items-center space-x-8">
<div class="flex items-center space-x-3">
<div id="score-chart" style="width: 50px; height: 50px;"></div>
<div>
<div class="text-sm font-bold">综合匹配度</div>
<div id="score-up" class="text-xs text-[#10B981]">提升了 0%</div>
</div>
</div>
<div class="h-10 w-[1px] bg-[#3A3A3A]"></div>
<div class="flex space-x-6">
<div class="text-center"><div class="text-xs text-[#666666] mb-1">能力匹配</div><div id="metric-skill" class="text-sm font-bold">0%</div></div>
<div class="text-center"><div class="text-xs text-[#666666] mb-1">经验密度</div><div id="metric-exp" class="text-sm font-bold">0%</div></div>
<div class="text-center"><div class="text-xs text-[#666666] mb-1">行业关键词</div><div id="metric-kw" class="text-sm font-bold">0%</div></div>
</div>
</div>
<div class="flex items-center gap-2 flex-wrap">
<span class="text-[10px] text-[#666666] uppercase tracking-wider">套用模板</span>
<div id="template-chips" class="flex gap-2 flex-wrap"></div>
</div>
</div>

<div class="flex-1 flex overflow-hidden">
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 bg-[#1E1E1E]">
<div class="mb-4"><h4 class="text-xs font-bold text-[#666666] uppercase tracking-widest">原始简历 PDF</h4></div>
<div class="pdf-sheet">
<img id="original-pdf-preview" alt="原始简历预览" src=""/>
</div>
<p id="original-fallback" class="hidden text-sm text-[#AAAAAA] mt-4 whitespace-pre-wrap"></p>
</div>
<div class="w-72 border-x border-[#3A3A3A] bg-[#222] overflow-y-auto custom-scrollbar flex-none">
<div class="p-4 border-b border-[#3A3A3A] bg-[#252525]">
<h4 class="text-xs font-bold text-[#AAAAAA] uppercase">AI 优化建议清单</h4>
</div>
<div id="suggest-list" class="divide-y divide-[#3A3A3A]"></div>
</div>
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 bg-[#1A1A1A]">
<div class="mb-4 flex items-center justify-between">
<h4 class="text-xs font-bold text-[#4F8CFF] uppercase tracking-widest">AI 优化版简历预览</h4>
<span class="text-[10px] px-2 py-0.5 bg-[#10B981]/20 text-[#10B981] rounded">模板预览</span>
</div>
<div class="pdf-sheet relative">
<div id="preview-loading" class="hidden absolute inset-0 bg-white/80 z-10 flex items-center justify-center text-[#4F8CFF] text-sm">正在套用模板...</div>
<iframe id="optimized-preview-frame" title="优化简历预览" class="w-full h-full border-0 bg-white"></iframe>
</div>
</div>
</div>
</div>
</div>
</main>
<script src="js/bridge.js"></script>
<script src="js/optimize.js"></script>
</body>
</html>
